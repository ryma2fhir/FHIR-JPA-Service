services:
  hapi-fhir-jpa-server:
    image: hapiproject/hapi:latest
    container_name: hapi-fhir-jpa-server
    ports:
      - "8080:8080"
    volumes:
      - ./packages:/packages
      - ./addPackages.sh:/addPackages.sh
    entrypoint: ["/bin/bash", "/addPackages.sh"]
    environment:
      - HAPI_FHIR_VERSION=R4
    restart: unless-stopped