# -------------------------------------------------------------------------------------
# Server & Spring Boot
# -------------------------------------------------------------------------------------
server:
  # Uncomment to serve FHIR under a non-default context path (e.g., /example/path/fhir)
  # servlet:
  #   context-path: /example/path
  port: 8080
  tomcat:
    # allow | as a separator in URLs
    relaxed-query-chars: "|"

management:
  # Actuator endpoints: only /actuator/health exposed by default
  endpoints:
    enabled-by-default: false
    web:
      exposure:
        include: "health"  # or "info,health,prometheus,metrics" or "*" for all
  endpoint:
    info:
      enabled: true
    metrics:
      enabled: true
    health:
      enabled: true
      probes:
        enabled: true
      group:
        liveness:
          include: [ "livenessState", "readinessState" ]
    prometheus:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

spring:
  application:
    name: "@project.artifactId@"

  ai:
    mcp:
      server:
        name: FHIR MCP Server
        version: 1.0.0
        instructions: "This server provides access to a FHIR RESTful API. You can use it to query FHIR resources, perform operations, and retrieve data in a structured format."
        enabled: true
        streamable-http:
          mcp-endpoint: /mcp/messages

  main:
    allow-bean-definition-overriding: false
    allow-circular-references: true
    banner-mode: off

  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration

  flyway:
    enabled: false
    baseline-on-migrate: true
    fail-on-missing-locations: false

  datasource:
    url: jdbc:h2:mem:test_mem
    username: sa
    password: null
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 10

  jpa:
    properties:
      hibernate:
        format_sql: false
        show_sql: false
        dialect: ca.uhn.fhir.jpa.model.dialect.HapiFhirH2Dialect
        hbm2ddl:
          auto: update
        jdbc:
          batch_size: 20
        cache:
          use_query_cache: false
          use_second_level_cache: false
          use_structured_entries: false
          use_minimal_puts: false

# -------------------------------------------------------------------------------------
# HAPI FHIR — grouped by domain
# -------------------------------------------------------------------------------------
hapi:
  fhir:
    # --- A. Core Server ---
    openapi_enabled: true
    fhir_version: R4
    allow_external_references: true        # ← lift the external reference block
    allow_external_valueset_expansion: true

    # --- B. Terminology ---
    terminology:
      valueset_preexpansion_mode: IGNORE
      valueset_expansion_mode: USE_EXPANSION_OPERATION
      valueset_membership_mode: USE_EXPANSION
      code_lookup_mode: AUTO
      allow_external_valueset_expansion: true
      remote_terminology:
        - url: '${ONTO_SERVER_URL}'
          client_interceptor_beans:
            - terminologyInterceptor

    # --- C. Data ---
    data:
      search_parameter_mode: USE_SEARCH_PARAMETERS
      terminology_parameter_mode: USE_VALUE_SET_URL
      profile_mode: DECLARED

    # --- D. Extensibility ---
    custom-bean-packages:
      - com.nhs
    custom-interceptor-classes:
      - com.nhs.TerminologyInterceptor

    # --- E. Clinical Reasoning ---
    cr:
      enabled: false
      caregaps:
        reporter: "default"
        section_author: "default"